<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>華媽咪閨蜜花園</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { background-color: #FDFBF7; font-family: -apple-system, "Microsoft JhengHei", sans-serif; margin: 0; padding: 15px; color: #5D4037; }
        .user-profile { display: flex; align-items: center; background: white; padding: 10px 15px; border-radius: 50px; border: 2px solid #FFD166; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        #userPic { width: 40px; height: 40px; border-radius: 50%; border: 2px solid #FFFDE7; margin-right: 12px; object-fit: cover; background: #EEE; }
        #displayName { font-weight: bold; color: #5D4037; font-size: 14px; }
        .login-status { font-size: 10px; color: #4CAF50; margin-top: 2px; }
        .tab-container { display: flex; gap: 5px; margin-bottom: 20px; position: sticky; top: 0; z-index: 10; background: #FDFBF7; padding: 5px 0; }
        .tab-btn { flex: 1; padding: 10px 5px; border-radius: 12px; border: 2px solid #FFD166; background: white; font-weight: bold; cursor: pointer; color: #8D6E63; font-size: 0.8rem; transition: 0.3s; }
        .tab-btn.active { background: #FFD166; color: #5D4037; box-shadow: 0 3px 0 #FFB000; }
        .card { background: white; padding: 15px; border-radius: 20px; border: 3px solid #FFD166; margin-bottom: 20px; }
        .dashboard { background: #FFFDE7; border-radius: 15px; padding: 15px; text-align: center; margin-bottom: 15px; border: 2px dashed #FFCA28; }
        .points-number { color: #FF6F00; font-size: 2.5rem; font-weight: 900; }
        .submit-btn { width: 100%; background: #FFD166; color: #5D4037; border: none; padding: 15px; margin-top: 15px; border-radius: 25px; font-size: 1rem; font-weight: bold; cursor: pointer; box-shadow: 0 4px 0 #FFB000; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.9); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 100; font-weight: bold; color: #D84315; }
        .gift-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .gift-item { background: white; border-radius: 15px; padding: 10px; border: 1px solid #FFD166; text-align: center; }
        .img-container { width: 100%; aspect-ratio: 1/1; overflow: hidden; border-radius: 10px; margin-bottom: 8px; }
        .gift-img { width: 100%; height: 100%; object-fit: cover; }
        select, input[type="file"] { width: 100%; padding: 12px; margin-top: 8px; border-radius: 12px; border: 1px solid #DDD; }
        .history-box { background: #F5F5F5; border-radius: 12px; padding: 12px; margin-top: 15px; font-size: 13px; border-left: 5px solid #FFD166; }
    </style>
</head>
<body>
<div id="loading" class="overlay">🚀 處理中...</div>
<div class="user-profile">
    <img id="userPic" src="https://via.placeholder.com/40">
    <div><div id="displayName">讀取中...</div><div class="login-status">● LINE 帳號已連線</div></div>
</div>
<div class="tab-container">
    <button id="tab-event" class="tab-btn active" onclick="switchTab('event')">📝 活動集點</button>
    <button id="tab-honey" class="tab-btn" onclick="switchTab('honey')">🫘 尊榮蜜豆</button>
    <button id="tab-lucky" class="tab-btn" onclick="switchTab('lucky')">🎁 上線抽獎</button>
</div>

<div id="eventContent" class="tab-content">
    <div class="card">
        <div class="dashboard"><div>目前活動累積點數</div><div class="points-number" id="userPoints">--</div></div>
        <label>📅 選擇參加場次</label>
        <select id="eventSelect">
            <option>週一｜12:00 養美日記📓</option><option>週一｜20:00 親子晚自習</option>
            <option>週三｜21:00 閨蜜群 Live Talk</option><option>週四｜20:00 瘦身健康講座</option>
            <option>週五｜13:00 親子群 Live Talk</option><option>週五｜20:00 廠商產品分享+贊助</option>
            <option>週六｜12:00 AICC(AICC活軟骨)</option><option>週日｜ 分享意義日（閨蜜群）</option><option>特別加碼場✨</option>
        </select>
        <input type="file" id="eventFile" accept="image/*">
        <button class="submit-btn" onclick="upload('event')">送出集點截圖 🚀</button>
        <div id="actHistoryBox" class="history-box" style="display:none;"><div id="actHistoryList"></div></div>
    </div>
</div>

<div id="honeyContent" class="tab-content" style="display:none;">
    <div class="card">
        <div class="dashboard"><div>尊榮累積蜜豆</div><div class="points-number">🫘 <span id="honeyBeans">--</span></div></div>
        <label>📸 上傳消費截圖</label>
        <input type="file" id="shopFile" accept="image/*">
        <button class="submit-btn" onclick="upload('shop')">上傳蜜豆截圖 🛍️</button>
        <div id="beanHistoryBox" class="history-box" style="display:none;"><div id="beanHistoryList"></div></div>
    </div>
</div>

<div id="luckyContent" class="tab-content" style="display:none;">
    <div class="card">
        <div class="dashboard">
            <div style="font-weight:bold; color:#D84315;">✨ 上線抽獎專區 ✨</div>
            <p style="font-size:13px; color:#8D6E63; margin-top:10px;">只要上傳今日活動截圖<br>即可參加抽獎名單核對喔！</p>
        </div>
        <label>📸 上傳今日上線截圖</label>
        <input type="file" id="luckyFile" accept="image/*">
        <button class="submit-btn" style="background:#FF7043; color:white; box-shadow:0 4px 0 #D84315;" onclick="upload('lucky')">參加抽獎報到 🙋‍♀️</button>
    </div>
</div>

<script>
    const LIFF_ID = "2008783359-9JsMUCsX"; 
    const GAS_URL = "https://script.google.com/macros/s/AKfycbx7z6QCXkx_uHqd9a-QcJ9JqJJP9tVkTyn6a-OAhmzKUTqZdsKr4Z_JO-eXQpk19r4nbg/exec";
    let userName = ""; let userId = ""; let userPic = "";

    function switchTab(type) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('tab-' + type).classList.add('active');
        document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
        document.getElementById(type + 'Content').style.display = 'block';
    }

    window.onload = function() {
        liff.init({ liffId: LIFF_ID }).then(async () => {
            if (!liff.isLoggedIn()) { liff.login(); } else {
                const profile = await liff.getProfile();
                userId = profile.userId; userName = profile.displayName; userPic = profile.pictureUrl;
                document.getElementById('displayName').innerText = userName;
                if (userPic) document.getElementById('userPic').src = userPic;
                fetchData();
            }
        });
    };

    async function fetchData() {
        if (!userId) return;
        const res = await fetch(`${GAS_URL}?lineId=${userId}&t=${Date.now()}`);
        const data = await res.json();
        document.getElementById('userPoints').innerText = data.eventPoints || 0;
        document.getElementById('honeyBeans').innerText = data.honeyBeans || 0;
        if(data.actHistory && data.actHistory.length > 0) {
            document.getElementById('actHistoryBox').style.display = 'block';
            document.getElementById('actHistoryList').innerHTML = data.actHistory.map(item => `<div>${item}</div>`).join('');
        }
    }

    async function upload(type) {
        if (!userId) { alert("尚未登入！"); return; }
        let fileId = type === 'event' ? 'eventFile' : (type === 'shop' ? 'shopFile' : 'luckyFile');
        const fileInput = document.getElementById(fileId);
        if (!fileInput.files[0]) { alert("請選取圖片！"); return; }
        document.getElementById('loading').style.display = "flex";
        const reader = new FileReader();
        reader.readAsDataURL(fileInput.files[0]);
        reader.onload = async (e) => {
            const payload = { 
                type: type === 'lucky' ? "上線抽獎" : (type === 'event' ? "活動集點" : "蜜豆累積"), 
                lineId: userId, userName: userName, 
                itemName: type === 'event' ? document.getElementById('eventSelect').value : "抽獎報到",
                image: e.target.result 
            };
            await fetch(GAS_URL, { method: "POST", body: JSON.stringify(payload) });
            alert("上傳成功！"); location.reload();
        };
    }
</script>
</body>
</html>
